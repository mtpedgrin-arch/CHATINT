<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino 463 - Panel de Administracion</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a0f;
            --bg-card: #111218;
            --border-color: #1e1f2e;
            --gold: #D4A843;
            --gold-light: #e8c36a;
            --gold-dark: #b8912e;
            --text-primary: #e8e8ed;
            --text-secondary: #7a7b8e;
            --error-red: #e74c5c;
            --input-bg: #0d0d14;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ========== Animated Background ========== */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-gradient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.07;
            pointer-events: none;
            z-index: 0;
        }

        .bg-gradient-orb.orb-1 {
            width: 600px;
            height: 600px;
            background: var(--gold);
            top: -200px;
            right: -100px;
            animation: floatOrb1 20s ease-in-out infinite;
        }

        .bg-gradient-orb.orb-2 {
            width: 500px;
            height: 500px;
            background: #6a4fd4;
            bottom: -150px;
            left: -100px;
            animation: floatOrb2 25s ease-in-out infinite;
        }

        .bg-gradient-orb.orb-3 {
            width: 400px;
            height: 400px;
            background: var(--gold-dark);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: floatOrb3 18s ease-in-out infinite;
        }

        @keyframes floatOrb1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(-80px, 60px) scale(1.1); }
            50% { transform: translate(-40px, 120px) scale(0.95); }
            75% { transform: translate(60px, 40px) scale(1.05); }
        }

        @keyframes floatOrb2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(100px, -40px) scale(1.05); }
            50% { transform: translate(60px, -100px) scale(1.1); }
            75% { transform: translate(-40px, -60px) scale(0.95); }
        }

        @keyframes floatOrb3 {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.07; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.04; }
        }

        /* Particle field */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat linear infinite;
        }

        @keyframes particleFloat {
            0% {
                opacity: 0;
                transform: translateY(100vh) scale(0);
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                opacity: 0;
                transform: translateY(-10vh) scale(1);
            }
        }

        /* ========== Login Card ========== */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 48px 40px 40px;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 4px 24px rgba(0, 0, 0, 0.4),
                0 0 80px rgba(212, 168, 67, 0.03),
                inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 168, 67, 0.3), transparent);
        }

        /* ========== Logo ========== */
        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 28px;
        }

        .diamond-logo {
            width: 72px;
            height: 72px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: default;
        }

        .diamond-shape {
            position: absolute;
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            transform: rotate(45deg);
            border-radius: 6px;
            box-shadow:
                0 0 30px rgba(212, 168, 67, 0.3),
                0 0 60px rgba(212, 168, 67, 0.15),
                0 0 90px rgba(212, 168, 67, 0.05),
                inset 0 1px 1px rgba(255, 255, 255, 0.25);
            animation: diamondGlow 3s ease-in-out infinite;
        }

        .diamond-shape::before {
            content: '';
            position: absolute;
            inset: 2px;
            border-radius: 4px;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 60%);
        }

        @keyframes diamondGlow {
            0%, 100% {
                box-shadow:
                    0 0 30px rgba(212, 168, 67, 0.3),
                    0 0 60px rgba(212, 168, 67, 0.15),
                    0 0 90px rgba(212, 168, 67, 0.05),
                    inset 0 1px 1px rgba(255, 255, 255, 0.25);
            }
            50% {
                box-shadow:
                    0 0 40px rgba(212, 168, 67, 0.4),
                    0 0 80px rgba(212, 168, 67, 0.2),
                    0 0 120px rgba(212, 168, 67, 0.08),
                    inset 0 1px 1px rgba(255, 255, 255, 0.25);
            }
        }

        .diamond-text {
            position: relative;
            z-index: 2;
            font-size: 18px;
            font-weight: 800;
            color: #0a0a0f;
            letter-spacing: 1px;
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.2);
        }

        /* ========== Title ========== */
        .login-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .login-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 400;
            margin-bottom: 36px;
            letter-spacing: 0.3px;
        }

        /* ========== Form ========== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 8px;
            letter-spacing: 0.2px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
            transition: color 0.3s ease;
            display: flex;
            align-items: center;
        }

        .input-icon svg {
            width: 18px;
            height: 18px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: #3d3e52;
        }

        .form-input:hover {
            border-color: #2a2b3d;
        }

        .form-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 168, 67, 0.1), 0 0 20px rgba(212, 168, 67, 0.05);
        }

        .form-input:focus ~ .input-icon,
        .form-input:focus + .input-icon {
            color: var(--gold);
        }

        .input-wrapper:focus-within .input-icon {
            color: var(--gold);
        }

        /* Password toggle */
        .password-toggle {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease;
            border-radius: 6px;
        }

        .password-toggle:hover {
            color: var(--gold);
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
        }

        /* ========== Button ========== */
        .btn-login {
            width: 100%;
            padding: 15px 24px;
            margin-top: 8px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #0a0a0f;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.5s ease;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow:
                0 4px 16px rgba(212, 168, 67, 0.3),
                0 8px 32px rgba(212, 168, 67, 0.15);
        }

        .btn-login:hover:not(:disabled)::before {
            left: 100%;
        }

        .btn-login:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .btn-spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(10, 10, 15, 0.25);
            border-top-color: #0a0a0f;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .btn-login.loading .btn-spinner {
            display: block;
        }

        .btn-login.loading .btn-text-default {
            display: none;
        }

        .btn-login.loading .btn-text-loading {
            display: inline;
        }

        .btn-text-loading {
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== Error Message ========== */
        .error-message {
            display: none;
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(231, 76, 92, 0.08);
            border: 1px solid rgba(231, 76, 92, 0.2);
            border-radius: 10px;
            color: var(--error-red);
            font-size: 13px;
            text-align: center;
            animation: errorShake 0.4s ease;
        }

        .error-message.visible {
            display: block;
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        /* ========== Divider ========== */
        .card-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-color), transparent);
            margin: 28px 0 20px;
        }

        /* ========== Footer ========== */
        .login-footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 12px;
            opacity: 0.6;
            letter-spacing: 0.2px;
        }

        /* ========== Responsive ========== */
        @media (max-width: 480px) {
            .login-wrapper {
                padding: 16px;
            }

            .login-card {
                padding: 36px 24px 32px;
                border-radius: 16px;
            }

            .login-title {
                font-size: 24px;
            }

            .diamond-shape {
                width: 48px;
                height: 48px;
            }

            .diamond-text {
                font-size: 15px;
            }
        }

        /* ========== Card entrance animation ========== */
        .login-card {
            animation: cardEntrance 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.97);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Subtle top border shimmer */
        .login-card::after {
            content: '';
            position: absolute;
            top: -1px;
            left: 20%;
            right: 20%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0;
            animation: shimmer 4s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0; left: 20%; right: 20%; }
            50% { opacity: 0.5; left: 10%; right: 10%; }
        }
    </style>
</head>
<body>

    <!-- Background Effects -->
    <div class="bg-gradient-orb orb-1"></div>
    <div class="bg-gradient-orb orb-2"></div>
    <div class="bg-gradient-orb orb-3"></div>
    <div class="particles" id="particles"></div>

    <!-- Login Card -->
    <div class="login-wrapper">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo-container">
                <div class="diamond-logo">
                    <div class="diamond-shape"></div>
                    <span class="diamond-text">463</span>
                </div>
            </div>

            <!-- Title -->
            <h1 class="login-title">Casino 463</h1>
            <p class="login-subtitle">Panel de Administraci&oacute;n</p>

            <!-- Form -->
            <form id="loginForm" autocomplete="on">
                <div class="form-group">
                    <label class="form-label" for="email">Correo Electr&oacute;nico</label>
                    <div class="input-wrapper">
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-input"
                            placeholder="admin@casino463.com"
                            autocomplete="email"
                            required
                        >
                        <span class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="4" width="20" height="16" rx="3"/>
                                <path d="M22 5L12 13 2 5"/>
                            </svg>
                        </span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Contrase&ntilde;a</label>
                    <div class="input-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-input"
                            placeholder="Ingrese su contrase&ntilde;a"
                            autocomplete="current-password"
                            required
                            style="padding-right: 48px;"
                        >
                        <span class="input-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="3"/>
                                <path d="M7 11V7a5 5 0 0110 0v4"/>
                                <circle cx="12" cy="16.5" r="1.5"/>
                            </svg>
                        </span>
                        <button type="button" class="password-toggle" id="passwordToggle" aria-label="Mostrar contrase&ntilde;a" tabindex="-1">
                            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg id="eyeOffIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                                <path d="M14.12 14.12a3 3 0 11-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="btnLogin">
                    <div class="btn-spinner"></div>
                    <span class="btn-text-default">Iniciar Sesi&oacute;n</span>
                    <span class="btn-text-loading">Ingresando...</span>
                </button>

                <div class="error-message" id="errorMessage"></div>
            </form>

            <!-- Footer -->
            <div class="card-divider"></div>
            <p class="login-footer">&copy; 2024 Casino 463. Todos los derechos reservados.</p>
        </div>
    </div>

    <script>
        // ========== Particles ==========
        (function createParticles() {
            const container = document.getElementById('particles');
            const count = 30;

            for (let i = 0; i < count; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (12 + Math.random() * 18) + 's';
                particle.style.animationDelay = (Math.random() * 20) + 's';
                particle.style.width = (1 + Math.random() * 2) + 'px';
                particle.style.height = particle.style.width;
                particle.style.opacity = '0';
                container.appendChild(particle);
            }
        })();

        // ========== Password Toggle ==========
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        const eyeIcon = document.getElementById('eyeIcon');
        const eyeOffIcon = document.getElementById('eyeOffIcon');

        passwordToggle.addEventListener('click', function () {
            const isPassword = passwordInput.type === 'password';
            passwordInput.type = isPassword ? 'text' : 'password';
            eyeIcon.style.display = isPassword ? 'none' : 'block';
            eyeOffIcon.style.display = isPassword ? 'block' : 'none';
            this.setAttribute('aria-label', isPassword ? 'Ocultar contrasena' : 'Mostrar contrasena');
        });

        // ========== Login Logic ==========
        const loginForm = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');
        const errorMessage = document.getElementById('errorMessage');
        const emailInput = document.getElementById('email');

        // Redirect if already authenticated
        (function checkAuth() {
            const token = localStorage.getItem('c463_token');
            if (token) {
                window.location.href = '/';
            }
        })();

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('visible');
        }

        function hideError() {
            errorMessage.classList.remove('visible');
        }

        function setLoading(loading) {
            if (loading) {
                btnLogin.classList.add('loading');
                btnLogin.disabled = true;
            } else {
                btnLogin.classList.remove('loading');
                btnLogin.disabled = false;
            }
        }

        loginForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            hideError();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Por favor, complete todos los campos.');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || data.error || 'Credenciales incorrectas. Intente nuevamente.');
                }

                // Save token and user data
                localStorage.setItem('c463_token', data.token);
                localStorage.setItem('c463_user', JSON.stringify(data.user));

                // Redirect to dashboard
                window.location.href = '/';

            } catch (err) {
                if (err.name === 'TypeError' && err.message === 'Failed to fetch') {
                    showError('Error de conexion. Verifique que el servidor este activo.');
                } else {
                    showError(err.message || 'Error al iniciar sesion. Intente nuevamente.');
                }
            } finally {
                setLoading(false);
            }
        });

        // Clear error on input
        emailInput.addEventListener('input', hideError);
        passwordInput.addEventListener('input', hideError);
    </script>
</body>
</html>
