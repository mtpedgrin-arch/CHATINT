<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Casino 463 - Admin Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .diamond {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #D4A843, #F4E4A0, #D4A843);
      transform: rotate(45deg);
      border-radius: 6px;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .diamond span {
      transform: rotate(-45deg);
      font-weight: 800;
      font-size: 18px;
      color: #0a0a0f;
    }
    h1 { color: #D4A843; margin-bottom: 0.5rem; font-size: 1.5rem; }
    p { color: #9ca3af; margin-bottom: 1.5rem; font-size: 0.95rem; }
    .spinner {
      width: 24px; height: 24px;
      border: 3px solid #333;
      border-top-color: #D4A843;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a {
      color: #D4A843;
      text-decoration: none;
      padding: 0.6rem 1.5rem;
      border: 1px solid #D4A843;
      border-radius: 8px;
      display: inline-block;
      transition: all 0.2s;
    }
    a:hover { background: #D4A843; color: #0a0a0f; }
    .note { color: #6b7280; font-size: 0.75rem; margin-top: 2rem; }
  </style>
  <script>
    // Auto-redirect to Vite dev server (React admin panel)
    // In production, replace this file with the React build output
    (function() {
      var port = window.location.port;
      var backendPorts = ['3003', '4000'];
      if (backendPorts.indexOf(port) !== -1) {
        // On backend port — redirect to Vite dev server
        var devUrl = window.location.protocol + '//' + window.location.hostname + ':5174';
        window.location.replace(devUrl);
      }
    })();
  </script>
</head>
<body>
  <div class="container">
    <div class="diamond"><span>463</span></div>
    <div class="spinner"></div>
    <h1>Casino 463 Admin</h1>
    <p>Redirigiendo al panel de administracion...</p>
    <a href="http://localhost:5174">Abrir Admin Panel</a>
    <p class="note">Si no redirige automaticamente, haz click en el enlace de arriba.<br>
    Backend API: puerto 4000 &nbsp;|&nbsp; Admin Panel: puerto 5174</p>
  </div>
</body>
</html>
